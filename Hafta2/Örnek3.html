<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Örnek 3</title>
</head>

<body>
    <header>
        <h1>Örnek 3</h1>
        <nav>
            <ul>
                <li><a href="#homepage">Ana Sayfa</a></li>
                <li><a href="#contact">Kayıt</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="homepage">
            <h2>Hoş geldiniz</h2>
            <p>Bu sayfa üzerinden kayıt olabilirsiniz.</p>
        </section>
        <section id="contact">
            <h2>Kayıt Formu</h2>
            <form action="#" method="post">
                <fieldset>
                    <legend>Kişisel Bilgiler</legend>
                    <label for="ad">Ad:</label>
                    <input type="text" id="ad" name="ad">
                    <br><br>
                    <label for="soyad">Soyad:</label>
                    <input type="text" id="soyad" name="soyad">
                    <br><br>
                    <label for="email">Email:</label>
                    <input type="text" id="email" name="email">
                    <br><br>
                    <label for="sifre">Şifre:</label>
                    <input type="password" id="sifre" name="sifre">
                    <br><br>
                    <label for="sehir">Şehir:</label>
                    <select name="sehir" id="sehir">
                        <option value="ankara">Ankara</option>
                        <option value="istanbul">İstanbul</option>
                        <option value="izmir">İzmir</option>
                    </select>
                    <br><br>
                    <button type="submit">Gönder</button>
                </fieldset>
            </form>

        </section>
    </main>
    <footer>
        <p>Ankara Üniversitesi Yazılım Mühendisliği</p>
    </footer>
</body>

</html>
