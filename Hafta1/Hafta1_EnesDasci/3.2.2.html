<!DOCTYPE html>
<html lang="tr">
<!-- rowspan ve colspan ile hiyerarşik yapı oluştur her pozisyona kişi adı ekle -->

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Organizasyon Şeması</title>
</head>

<body>
    <h1>Organizasyon Şeması</h1>

    <table border="1">
        <tr>
            <th colspan="3">Şirket</th>
        </tr>
        <tr>
            <td rowspan="2">Genel Müdür<br />Selim</td>
            <td>Teknoloji<br />Enes</td>
            <td>Pazarlama<br />Ömer</td>
        </tr>
        <tr>
            <td colspan="2">Operasyon<br />Enes K.</td>
        </tr>
    </table>
</body>

</html>
