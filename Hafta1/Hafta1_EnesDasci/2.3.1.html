<!DOCTYPE html>
<html lang="tr">
<!--h1 ile başlık, 3 kategori h2 ile , her kategori altında 2 resim, her resim için iç içe liste kullan-->

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fotoğraf Galerim</title>
</head>

<body>
    <h1>Fotoğraf Galerim</h1>

    <h2>Doğa</h2>
    <figure>
        <img src="https://picsum.photos/seed/nature1/300/200" alt="Doğa 1" width="300" height="200" />
        <figcaption>Doğa fotoğrafı 1</figcaption>
    </figure>
    <figure>
        <img src="https://picsum.photos/seed/nature2/300/200" alt="Doğa 2" width="300" height="200" />
        <figcaption>Doğa fotoğrafı 2</figcaption>
    </figure>

    <h2>Şehir</h2>
    <figure>
        <img src="https://picsum.photos/seed/city1/300/200" alt="Şehir 1" width="300" height="200" />
        <figcaption>Şehir fotoğrafı 1</figcaption>
    </figure>
    <figure>
        <img src="https://picsum.photos/seed/city2/300/200" alt="Şehir 2" width="300" height="200" />
        <figcaption>Şehir fotoğrafı 2</figcaption>
    </figure>

    <h2>Karışık</h2>
    <figure>
        <img src="https://picsum.photos/seed/mix1/300/200" alt="Karışık 1" width="300" height="200" />
        <figcaption>Karışık fotoğraf 1</figcaption>
    </figure>
    <figure>
        <img src="https://picsum.photos/seed/mix2/300/200" alt="Karışık 2" width="300" height="200" />
        <figcaption>Karışık fotoğraf 2</figcaption>
    </figure>
</body>

</html>
