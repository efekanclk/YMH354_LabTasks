<!DOCTYPE html>
<html lang="tr">
<!-- colspan ve rowspan kullanarak tabloyu 2 satır yap-->

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sınav Sonuçları</title>
</head>

<body>
    <h1>Sınav Sonuçları</h1>

    <table border="1">
        <thead>
            <tr>
                <th>Öğrenci</th>
                <th colspan="2">Sınavlar</th>
            </tr>
            <tr>
                <th>Ad</th>
                <th>Vize</th>
                <th>Final</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Selim</td>
                <td>80</td>
                <td>85</td>
            </tr>
            <tr>
                <td>Enes</td>
                <td>75</td>
                <td>90</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
