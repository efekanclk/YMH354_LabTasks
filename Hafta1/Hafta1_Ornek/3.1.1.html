<!DOCTYPE html>
<html lang="tr">
<!--h1 ile başlık, tablo ile ders programı, caption, thead, tbody, th, td kullan-->
<!--ilk sütun saat, diğerleri pazartesi-cuma, thead ve  tbody kullan,  her derse ders adı yaz, boş saatlere boş yaz, tablo başlığı caption ile ekle-->

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ders Programı</title>
</head>

<body>
    <h1>Haftalık Ders Programı</h1>

    <table border="1">
        <caption>Haftalık Ders Programı</caption>
        <thead>
            <tr>
                <th>Saat</th>
                <th>Pazartesi</th>
                <th>Salı</th>
                <th>Çarşamba</th>
                <th>Perşembe</th>
                <th>Cuma</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>09:00-10:00</th>
                <td>Boş</td>
                <td>Boş</td>
                <td>Boş</td>
                <td>Web</td>
                <td>Web</td>
            </tr>
            <tr>
                <th>10:00-11:00</th>
                <td>Boş</td>
                <td>DB</td>
                <td>Boş</td>
                <td>Boş</td>
                <td>Boş</td>
            </tr>
            <tr>
                <th>11:00-12:00</th>
                <td>AI</td>
                <td>Boş</td>
                <td>AI</td>
                <td>Boş</td>
                <td>Boş</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
