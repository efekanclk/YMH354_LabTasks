<!DOCTYPE html>
<html lang="tr">
<!--h1 ile başlık, tablo ile telefon karşılaştırma, caption, thead, tbody, th, td kullan-->
<!--özellikler : model, fiyat, ram, depolama, kamera, pil-->

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telefon Karşılaştırma</title>
</head>

<body>
    <h1>Telefon Karşılaştırma</h1>

    <table border="1">
        <caption>3 Telefon Karşılaştırması</caption>
        <thead>
            <tr>
                <th>Özellik</th>
                <th>Model A</th>
                <th>Model B</th>
                <th>Model C</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>Fiyat</th>
                <td>800€</td>
                <td>650€</td>
                <td>500€</td>
            </tr>
            <tr>
                <th>RAM</th>
                <td>8 GB</td>
                <td>8 GB</td>
                <td>6 GB</td>
            </tr>
            <tr>
                <th>Depolama</th>
                <td>256 GB</td>
                <td>128 GB</td>
                <td>128 GB</td>
            </tr>
            <tr>
                <th>Kamera</th>
                <td>48 MP</td>
                <td>50 MP</td>
                <td>12 MP</td>
            </tr>
            <tr>
                <th>Pil</th>
                <td>4500 mAh</td>
                <td>5000 mAh</td>
                <td>4000 mAh</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
